<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Draft Order — Lawson League</title>

<!--
  ===========================================================================
  TEMPLATE · DRAFT BOARD
  ===========================================================================
  DATA CONTRACT
    when_line     e.g. "Saturday · Aug 29 · 7:00 PM"
    format_line   e.g. "SNAKE · 15 ROUNDS"
    order_note    e.g. "Order set by last season"
    round_label   e.g. "Round 1 · reverse standings order"
    picks[]       { n, team, meta }   n zero-padded: 01, 02 …
                  meta for pick 1 is usually "On the clock · 90s"
    house_rules   one paragraph
    footer_line
  ===========================================================================
-->

<link rel="stylesheet" href="../assets/fonts/fonts.css">
<link rel="stylesheet" href="../tokens/tokens.css">
<link rel="stylesheet" href="_shared.css">
</head>
<body>

<div class="sheet">

  <div class="masthead" style="padding:20px 34px">
    <div class="masthead-id">
      <img src="../assets/logo/monogram-badge.svg" alt="Lawson League" style="width:50px;height:50px">
      <div>
        <div class="ey" style="font-size:11px;color:var(--gold-400)">{{WHEN_LINE}}</div>
        <div class="hl" style="font-size:28px;margin-top:2px">Draft Order</div>
      </div>
    </div>
    <div class="masthead-meta">
      <div class="big">{{FORMAT_LINE}}</div>
      <div>{{ORDER_NOTE}}</div>
    </div>
  </div>

  <div style="padding:24px 30px">
    <div class="ey" style="margin-bottom:14px">{{ROUND_LABEL}}</div>

    <div class="grid-3" style="gap:12px">
      <!-- REPEAT:pick — 12 cards. Add "is-first" to pick 01 only. -->
      <div class="pick is-first">
        <span class="pick-n">{{N}}</span>
        <div>
          <div class="pick-team">{{TEAM}}</div>
          <div class="pick-meta">{{META}}</div>
        </div>
      </div>
      <!-- /REPEAT:pick -->
    </div>

    <div class="note-box" style="margin-top:22px">
      <span class="note-label">House rules:</span> {{HOUSE_RULES}}
    </div>
  </div>

  <div class="footer">{{FOOTER_LINE}}</div>

</div>
</body>
</html>
